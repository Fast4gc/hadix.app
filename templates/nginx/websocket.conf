# Template: proxy com suporte a WebSocket persistente (ex: Socket.IO, bots com painel web)
# Placeholders: __DOMAIN__  __PORT__  __APP_NAME__

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    access_log /var/log/nginx/__APP_NAME__.access.log;
    error_log  /var/log/nginx/__APP_NAME__.error.log;

    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
