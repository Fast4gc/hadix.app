# Template: API reverse proxy (Node/Express/Fastify/Nest/etc rodando em __PORT__)
# Placeholders substituidos pelos scripts commands/*.sh:
#   __DOMAIN__  __PORT__  __APP_NAME__

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    access_log /var/log/nginx/__APP_NAME__.access.log;
    error_log  /var/log/nginx/__APP_NAME__.error.log;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:__PORT__/health;
    }
}
